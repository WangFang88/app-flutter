server.port=8080

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:reminder_app}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:reminder}
spring.datasource.password=${MYSQL_PASSWORD:reminder}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:dev-insecure-secret-key-must-be-at-least-256-bits-long}
jwt.expiration=31536000000

apns.enabled=${APNS_ENABLED:false}
apns.team-id=${APNS_TEAM_ID:}
apns.key-id=${APNS_KEY_ID:}
apns.bundle-id=${APNS_BUNDLE_ID:com.jdarray.reminderapp}
apns.private-key-path=${APNS_PRIVATE_KEY_PATH:}
apns.use-sandbox=${APNS_USE_SANDBOX:true}
